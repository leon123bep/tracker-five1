<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Chañar</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center; min-height:100vh; background:#fff8f3; font-family:sans-serif; color:#E8640A; }
    .loader { text-align:center; }
    .spinner { width:48px; height:48px; border:4px solid #f3d5c0; border-top:4px solid #E8640A; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { margin:0; font-size:15px; opacity:.7; }
  </style>
</head>
<body>
  <div class="loader"><div class="spinner"></div><p>Abriendo Google Maps...</p></div>
  <script>
    const DESTINATION = "https://maps.app.goo.gl/Z4eDHrFGPC1A8nqo6?g_st=ic";
    const BIN_ID = "69e92f18856a68218960b26e";
    const API_KEY = "$2a$10$EqJaXM/hwUseOhRgGEjsG.yBpzJLYn.Fw/E0nCMTyzRhl6yokw6wu";
    async function trackAndRedirect() {
      try {
        const res = await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID + "/latest", {
          method: "GET",
          headers: { "X-Master-Key": API_KEY, "X-Bin-Meta": "false" }
        });
        const data = await res.json();
        const scans = data.scans || [];
        scans.push({ timestamp: new Date().toISOString(), userAgent: navigator.userAgent.substring(0, 80) });
        await fetch("https://api.jsonbin.io/v3/b/" + BIN_ID, {
          method: "PUT",
          headers: { "Content-Type": "application/json", "X-Master-Key": API_KEY },
          body: JSON.stringify({ scans: scans })
        });
      } catch (e) { console.log(e); }
      window.location.href = DESTINATION;
    }
    trackAndRedirect();
  </script>
</body>
</html>
